services:
  - type: web
    name: my-backend-test
    runtime: python
    region: frankfurt  # ou singapore
    plan: free
    branch: main
    buildCommand: |
      chmod +x build.sh
      ./build.sh
    startCommand: gunicorn django_project.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: django_project.settings
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: my-backend-db
          property: connectionString

databases:
  - name: my-backend-db
    databaseName: my_backend_db
    user: my_backend_user
    plan: free
    region: frankfurt